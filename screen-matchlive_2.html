* { margin:0; padding:0; box-sizing:border-box; }

:root {
  /* All colour tokens defined in tokens.css */
  /* Semantic shortcuts for this screen */
  --bg:              var(--color-charcoal);
  --bg-card:         var(--color-off-black);
  --bg-overlay:      var(--color-black);
  --text-primary:    var(--color-white);
  --text-muted:      var(--color-mid-grey);
  --text-disabled:   var(--color-dark-grey);
  --divider-strong:  var(--color-white);
  --divider-subtle:  var(--color-dark-grey);
  --accent-gold:     var(--color-yellow-bright);
  --accent-green:    var(--color-green-bright);
  --accent-red:      var(--color-red-bright);
  --accent-purple:   var(--color-purple-bright);
  --team-home:       var(--color-yellow-bright);
  --team-away:       var(--color-purple-bright);
  --standing-rank-1: var(--color-purple-bright);
  --standing-rank-2: var(--color-purple-dark);
  --standing-rank-3: hsl(251 51% 28%);
  --standing-rank-4: var(--color-dark-grey);
  --event-goal:      var(--color-yellow-bright);
  --event-card:      var(--color-yellow-bright);
  --event-redcard:   var(--color-red-bright);
  --event-sub:       var(--color-purple-bright);
  --event-var:       var(--color-mid-grey);
  --event-now:       var(--color-green-bright);
  --stat-home:       var(--color-yellow-bright);
  --stat-away:       var(--color-purple-bright);
  --stat-empty:      var(--color-mid-grey);
  --poss-home:       var(--color-yellow-bright);
  --poss-away:       var(--color-purple-bright);
  --countdown-color: var(--color-yellow-bright);
}

html {
  width:1080px;
  overflow-y:auto;
  overflow-x:hidden;
  background:var(--bg);
}
body {
  width:1080px; height:1920px;
  overflow:visible;
  background:var(--bg);
  font-family:'CBABeaconSans', sans-serif;
  color:var(--text-primary);
}

/* ── DEV CONTROLS ── */
#dev-controls {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  z-index:9999; background:var(--bg-overlay); border:1px solid var(--divider-subtle);
  border-radius:10px; padding:12px 20px;
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  justify-content:center; max-width:1040px;
}
#dev-controls label { color:var(--text-muted); font-size:var(--type-meta-size); letter-spacing:1px; text-transform:uppercase; white-space:nowrap; }
#scenario-select { background:var(--bg-card); color:var(--text-primary); border:1px solid var(--divider-subtle); border-radius:6px; padding:7px 12px; font-size:var(--type-meta-size); font-family:'CBABeaconSans',sans-serif; cursor:pointer; }
#apply-btn { background:color-mix(in srgb, var(--accent-green) 25%, black); color:var(--text-primary); border:1px solid color-mix(in srgb, var(--accent-green) 45%, black); border-radius:6px; padding:7px 18px; font-size:var(--type-meta-size); font-family:'CBABeaconSans',sans-serif; cursor:pointer; white-space:nowrap; }
#apply-btn:hover { background:color-mix(in srgb, var(--accent-green) 35%, black); }
.data-note { color:var(--divider-subtle); font-size:var(--type-meta-size); text-align:center; width:100%; }
.data-note span { color:var(--text-muted); }

/* ── SCREEN ── */
.screen {
  width:1080px; height:1920px;
  padding:72px 64px 160px 64px;
  display:flex; flex-direction:column;
}

/* ── TOP ROW ── */

//  Constructs the event description line from real API fields only.

//    detail      "Normal Goal" | "Penalty" | "Own Goal" |
//                "Yellow Card" | "Red Card" | "Yellow Red Card" |
//                "Substitution 1–5" | "Penalty confirmed" | "Penalty cancelled"
//    comments    "Foul" | "Argument" | null   (cards only, often null)
//    assist.name player coming OFF for subs; assister for goals; null otherwise
//    player.name always present
// ═══════════════════════════════════════════════════════════════
function buildDesc(event) {
  const { type, detail, comments, assist } = event;
  const assistName = assist?.name;

  if (type === 'Goal') {
    if (detail === 'Penalty')   return assistName ? `Penalty · foul by ${assistName}` : 'Penalty';
    if (detail === 'Own Goal')  return 'Own goal';
    // Normal Goal
    return assistName ? `Assist: ${assistName}` : 'No assist';
  }

  if (type === 'Card') {
    // comments is "Foul", "Argument", or null
    return comments ?? detail; // fall back to e.g. "Yellow Card" if no comment
  }

  if (type === 'subst') {
    // player = on, assist = off
    return assistName ? `Off: ${assistName}` : 'Substitution';
  }

  if (type === 'Var') {
    return detail ?? 'VAR review';
  }

  return detail ?? '–';
}

// ── type → display label & CSS class ─────────────────────────
function eventMeta(event) {
  const { type, detail } = event;
  if (type === 'Goal') {
    if (detail === 'Penalty')  return { label:'GOAL — Penalty', cls:'goal' };
    if (detail === 'Own Goal') return { label:'Own Goal',       cls:'goal' };
    return                            { label:'GOAL',           cls:'goal' };
  }
  if (type === 'Card') {
    if (detail === 'Red Card' || detail === 'Yellow Red Card')
      return { label: detail, cls:'redcard' };
    return { label: detail, cls:'card' };
  }
  if (type === 'subst') return { label:'Sub', cls:'sub' };
  if (type === 'Var')   return { label:'VAR', cls:'var' };
  return { label: type, cls:'var' };
}

      hShots:   REAL_STATS.home.shots,
      aShots:   REAL_STATS.away.shots,
      hTarget:  REAL_STATS.home.onTarget,
      aTarget:  REAL_STATS.away.onTarget,
      hCorners: REAL_STATS.home.corners,
      aCorners: REAL_STATS.away.corners,
      hFouls:   REAL_STATS.home.fouls,
      aFouls:   REAL_STATS.away.fouls,
    },
    eventCount: 15, // all events
  },
};

// ── State ─────────────────────────────────────────────────────
let lastH = null, lastA = null, clockInterval = null;

// ── Clock ─────────────────────────────────────────────────────
function startClock(elapsed, status) {
  if (clockInterval) clearInterval(clockInterval);
  const clockEl  = document.getElementById('match-clock');
  const periodEl = document.getElementById('match-period');
  if (status === 'HT') { clockEl.textContent = 'HT'; return; }
  if (status === 'FT') { clockEl.textContent = 'FT'; return; }
  periodEl.textContent = status === '1H' ? 'First Half' : 'Second Half';
  const base = (elapsed || 0) * 60, t0 = Date.now();
  function tick() {
    const s = base + Math.floor((Date.now()-t0)/1000);
    clockEl.textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }
  tick();
  clockInterval = setInterval(tick, 1000);
}

// ── Goal overlay ──────────────────────────────────────────────
function triggerGoal() {
  const el = document.getElementById('goal-overlay');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

// ── setStat — with empty state ─────────────────────────────────
function setStat(id, value, colorClass) {
  const el = document.getElementById(id);
  if (!el) return;
  const empty = value === null || value === undefined || value === '';
  el.textContent = empty ? '–' : value;
  el.className = 'stat-val ' + (empty ? 'empty' : colorClass);
}

// ── Render ────────────────────────────────────────────────────
function render(key) {
  const snap = SNAPSHOTS[key];
  if (!snap) return;

  // Live badge
  const isFT = snap.status === 'FT';
  document.getElementById('live-badge').className = 'live-badge' + (isFT ? ' ft' : '');
  document.getElementById('live-label').textContent = isFT ? 'FT' : 'LIVE';

  // Scores + goal detection
  const nh = snap.scoreH, na = snap.scoreA;
  if (lastH !== null && (nh > lastH || na > lastA)) triggerGoal();
  if (snap._goal && lastH === null) setTimeout(triggerGoal, 400);
  lastH = nh; lastA = na;
  document.getElementById('score-home').textContent = nh;
  document.getElementById('score-away').textContent = na;

  // Logos — from api-football CDN
  setLogo('home', HOME_ID);
  setLogo('away', 23);

  // HT subline
  const htEl = document.getElementById('ht-score');
  htEl.textContent = (snap.htH !== null && snap.htA !== null)
    ? `HT ${snap.htH}–${snap.htA}` : '';

  // Clock
  document.getElementById('match-period').textContent = snap.period;
  startClock(snap.elapsed, snap.status);

  // Possession
  const ph = parseInt(snap.stats.homePoss);
  document.getElementById('poss-home').textContent = snap.stats.homePoss ?? '–';
  document.getElementById('poss-away').textContent = snap.stats.awayPoss ?? '–';
  document.getElementById('poss-fill').style.width = isNaN(ph) ? '50%' : ph + '%';

  // Stats — all via setStat with null-safe fallback
  setStat('s-shots-h',   snap.stats.hShots,   'home');
  setStat('s-shots-a',   snap.stats.aShots,   'away');
  setStat('s-target-h',  snap.stats.hTarget,  'home');
  setStat('s-target-a',  snap.stats.aTarget,  'away');
  setStat('s-corners-h', snap.stats.hCorners, 'home');
  setStat('s-corners-a', snap.stats.aCorners, 'away');
  setStat('s-fouls-h',   snap.stats.hFouls,   'home');
  setStat('s-fouls-a',   snap.stats.aFouls,   'away');

  // Events — 5 most recent only, newest first
  const events = REAL_EVENTS.slice(0, snap.eventCount).reverse().slice(0, 5);
  document.getElementById('events-feed').innerHTML = events.map(e => {
    const isHome = e.team.id === HOME_ID;
    const { label, cls } = eventMeta(e);
    const desc = buildDesc(e);
    const playerColour = isHome ? 'home' : 'away';
    return `<div class="event-row">
      <div class="event-minute">${minuteStr(e.time)}</div>
      <div class="event-body">
        <div class="event-type ${cls}">${label}</div>
        <div class="event-desc">${desc}</div>
      </div>
      <div class="event-player ${playerColour}">${e.player.name}</div>
    </div>`;
  }).join('');
}

// ── Apply scenario ────────────────────────────────────────────
function applyScenario(key) {
  lastH = null; lastA = null;
  render(key);
}

document.getElementById('apply-btn').addEventListener('click', () =>
  applyScenario(document.getElementById('scenario-select').value));

applyScenario('full_time');
</script>
</body>
</html>
