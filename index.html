* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: var(--color-charcoal);
  font-family: 'CBABeaconSans', sans-serif;
}

/* ── SCREEN IFRAME ───────────────────────────────────── */
#screen-frame {
  width: 1080px;
  height: 1920px;
  border: none;
  display: block;
  transition: opacity 0.5s ease;
}
#screen-frame.fading { opacity: 0; }

/* ── TRANSITION OVERLAY ──────────────────────────────── */
#transition-overlay {
  position: fixed;
  inset: 0;
  background: var(--color-charcoal);
  opacity: 0;
  pointer-events: none;
  z-index: 100;
  transition: opacity 0.4s ease;
}
#transition-overlay.fade-in  { opacity: 1; }
#transition-overlay.fade-out { opacity: 0; }

/* ── CAROUSEL PROGRESS BAR ───────────────────────────── */
#progress-bar {
  position: fixed;
  bottom: 0; left: 0;
  height: 4px;
  background: var(--color-yellow-bright);
  width: 0%;
  z-index: 200;
  transition: width linear;
}

/* ── SCREEN LABEL (dev only) ─────────────────────────── */
#screen-label {
  position: fixed;
  top: 16px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: var(--color-mid-grey);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 1px;
  padding: 4px 14px;
  border-radius: 20px;
  z-index: 300;
  pointer-events: none;
  transition: opacity 0.3s;
}

/* ── DEV CONTROLS ────────────────────────────────────── */
#dev-bar {
  position: fixed;
  bottom: 16px; left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  background: rgba(0,0,0,0.92);
  border: 1px solid #444;
  border-radius: 12px;
  padding: 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 600px;
  max-width: 960px;
}
.dev-row {
  display: flex; align-items: center;
  gap: 12px; flex-wrap: wrap;
}
.dev-label {
  font-size: 13px; font-weight: 400;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: #666; white-space: nowrap;
}
.dev-select {
  background: #333; color: #fff;
  border: 1px solid #555; border-radius: 6px;
  padding: 7px 12px; font-size: 14px;
  font-family: 'CBABeaconSans', sans-serif;
  cursor: pointer; flex: 1;
}
.dev-btn {
  background: #1a3a1a; color: #fff;
  border: 1px solid #3a6a3a; border-radius: 6px;
  padding: 7px 16px; font-size: 13px;
  font-family: 'CBABeaconSans', sans-serif;
  cursor: pointer; white-space: nowrap;
  letter-spacing: 0.5px;
}
.dev-btn:hover { background: #2a4a2a; }
.dev-btn.active {
  background: var(--color-green-bright);
  color: #0a1f12;
  border-color: var(--color-green-bright);
}
.dev-divider {
  width: 100%; height: 1px;
  background: #333;
}
.dev-status {
  font-size: 12px; color: #555;
  letter-spacing: 0.5px;
  display: flex; gap: 16px; flex-wrap: wrap;
}
.dev-status span { color: #888; }
.dev-status b { color: var(--color-yellow-bright); font-weight: 400; }
</style>
</head>
<body>

<div id="transition-overlay"></div>
<iframe id="screen-frame" src="screen-matchlive.html" title="Dashboard screen"></iframe>
<iframe id="goal-frame" title="Goal overlay" style="display:none;position:absolute;inset:0;width:1080px;height:1920px;border:none;z-index:100;pointer-events:none;"></iframe>
<div id="progress-bar"></div>
<div id="screen-label">Match Live</div>

<!-- DEV CONTROLS -->
<div id="dev-bar">
  <div class="dev-row">
    <div class="dev-label">State</div>
    <select class="dev-select" id="state-select">
      <optgroup label="Live">
        <option value="match-live">Match Live</option>
        <option value="match-live-pair">Match Live — Pair</option>
        <option value="goal-overlay">Goal Overlay</option>
      </optgroup>
      <optgroup label="Upcoming">
        <option value="comingup-single" selected>Coming Up — Single</option>
        <option value="comingup-two">Coming Up — Two Matches</option>
        <option value="comingup-ko-unknown">Coming Up — KO (Opp. TBD)</option>
        <option value="comingup-ko-known">Coming Up — KO (Opp. Known)</option>
        <option value="comingup-sf">Coming Up — Semi-final</option>
        <option value="comingup-final">Coming Up — Final</option>
      </optgroup>
      <optgroup label="Results">
        <option value="match-complete">Match Complete</option>
        <option value="matches-complete">Latest Matches</option>
      </optgroup>
      <optgroup label="Group Stage">
        <option value="group-status-1">Group Stage A–F</option>
        <option value="group-status-2">Group Stage G–L</option>
      </optgroup>
      <optgroup label="Knockout">
        <option value="round-of-32">Round of 32</option>
      </optgroup>
    </select>
    <button class="dev-btn" id="go-btn">Go to screen</button>
  </div>

  <div class="dev-divider"></div>

  <div class="dev-row">
    <div class="dev-label">Carousel</div>
    <button class="dev-btn" id="play-btn">▶ Play</button>
    <button class="dev-btn" id="pause-btn">⏸ Pause</button>
    <div class="dev-label" style="margin-left:8px;">Speed</div>
    <select class="dev-select" style="flex:0;min-width:140px;" id="speed-select">
      <option value="5000">5s (test)</option>
      <option value="10000">10s (test)</option>
      <option value="45000" selected>45s (production)</option>
    </select>
  </div>

  <div class="dev-divider"></div>

  <div class="dev-status" id="dev-status">
    <div>Screen: <b id="st-screen">—</b></div>
    <div>Next in: <b id="st-next">—</b></div>
    <div>Carousel: <b id="st-carousel">paused</b></div>
    <div>Mode: <b id="st-mode">dev</b></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  SCREEN REGISTRY
//  Add new screens here as they're built.
//  Each entry: { id, label, src, urlParam }
//  src       → the HTML file to load in the iframe
//  urlParam  → the ?scenario= value passed to that screen
// ═══════════════════════════════════════════════════════════════
const SCREENS = [
  // ── Live ─────────────────────────────────────────────────────
  { id: 'match-live',          label: 'Match Live',                src: 'screen-matchlive.html',          urlParam: null },
  { id: 'match-live-pair',     label: 'Match Live — Pair',         src: 'screen-matchlivepair.html',      urlParam: null },
  // ── Upcoming — Group Stage ────────────────────────────────────
  { id: 'comingup-single',     label: 'Coming Up — Single',        src: 'screen-comingup.html',           urlParam: null },
  { id: 'comingup-two',        label: 'Coming Up — Two Matches',   src: 'screen-comingup-two.html',       urlParam: null },
  // ── Upcoming — Knockout ───────────────────────────────────────
  { id: 'comingup-ko-unknown', label: 'Coming Up — Opp. TBD',      src: 'screen-comingup-knockout.html',  urlParam: 'r32_unknown' },
  { id: 'comingup-ko-known',   label: 'Coming Up — Opp. Known',    src: 'screen-comingup-knockout.html',  urlParam: 'r32_known' },
  { id: 'comingup-sf',         label: 'Coming Up — Semi-final',    src: 'screen-comingup-knockout.html',  urlParam: 'sf_known' },
  { id: 'comingup-final',      label: 'Coming Up — Final',         src: 'screen-comingup-knockout.html',  urlParam: 'final_known' },
  // ── Results ───────────────────────────────────────────────────
  { id: 'match-complete',      label: 'Match Complete',            src: 'screen-matchcomplete.html',      urlParam: null },
  { id: 'matches-complete',    label: 'Latest Matches',            src: 'screen-matchescomplete.html',    urlParam: null },
  // ── Group Stage overview ──────────────────────────────────────
  { id: 'group-status-1',      label: 'Group Stage A–F',           src: 'screen-groupstatus-1.html',      urlParam: null },
  { id: 'group-status-2',      label: 'Group Stage G–L',           src: 'screen-groupstatus-2.html',      urlParam: null },
  // ── Knockout bracket ─────────────────────────────────────────
  { id: 'round-of-32',         label: 'Round of 32',               src: 'screen-roundof32.html',          urlParam: null },
  // ── Goal overlay (driven by postMessage, not carousel) ────────
  { id: 'goal-overlay',        label: 'Goal Scored',               src: 'screen-goal.html',               urlParam: null },
];

// ── Carousel config ───────────────────────────────────────────
// Each stage lists screen ids in display order.
// 'match-live' and 'match-live-pair' are injected dynamically
// when a live match is detected (see liveCheckLoop below).
// 'goal-overlay' is never in a carousel — triggered by postMessage.
const STAGE_CAROUSELS = {
  'group-stage': [
    'comingup-single',
    'comingup-two',
    'match-complete',
    'matches-complete',
    'group-status-1',
    'group-status-2',
  ],
  'round-of-32': [
    'comingup-ko-unknown',
    'comingup-ko-known',
    'round-of-32',
    'match-complete',
  ],
  'round-of-16': [
    'comingup-ko-unknown',
    'comingup-ko-known',
    'match-complete',
  ],
  'quarter-finals': [
    'comingup-ko-known',
    'match-complete',
  ],
  'semi-finals': [
    'comingup-sf',
    'match-complete',
  ],
  'finals': [
    'comingup-final',
    'match-complete',
  ],
};

// ── Stage UTC ranges (from brief) ────────────────────────────
const STAGE_RANGES = [
  { id:'group-stage',    start: Date.UTC(2026,5,10, 0, 0), end: Date.UTC(2026,5,28, 4, 0) },
  { id:'round-of-32',   start: Date.UTC(2026,5,28, 4, 1), end: Date.UTC(2026,6, 4, 3, 0) },
  { id:'round-of-16',   start: Date.UTC(2026,6, 4, 3, 1), end: Date.UTC(2026,6, 8, 0,30) },
  { id:'quarter-finals',start: Date.UTC(2026,6, 8, 0,31), end: Date.UTC(2026,6,12, 3,30) },
  { id:'semi-finals',   start: Date.UTC(2026,6,12, 3,31), end: Date.UTC(2026,6,14,21,30) },
  { id:'finals',        start: Date.UTC(2026,6,14,21,31), end: Date.UTC(2026,6,19,21,30) },
];

function getActiveStage() {
  const now = Date.now();
  for (const s of STAGE_RANGES) {
    if (now >= s.start && now <= s.end) return s.id;
  }
  // Before tournament or after — default to group-stage playlist
  return 'group-stage';
}

// Returns the playlist for the current stage, filtered to only
// screens that are actually registered (built) in SCREENS.
function getActivePlaylist() {
  const stage    = getActiveStage();
  const playlist = STAGE_CAROUSELS[stage] ?? STAGE_CAROUSELS['group-stage'];
  const built    = new Set(SCREENS.map(s => s.id));
  // Only include screens that exist — silently skips unbuilt ones
  return playlist.filter(id => built.has(id));
}

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let currentScreenId   = 'comingup-single';
let carouselPlaying   = false;
let carouselTimer     = null;
let progressTimer     = null;
let carouselIndex     = 0;
let slideDuration     = 45000;

// ═══════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════
const frame   = document.getElementById('screen-frame');
const overlay = document.getElementById('transition-overlay');
const label   = document.getElementById('screen-label');
const bar     = document.getElementById('progress-bar');

function screenById(id) {
  return SCREENS.find(s => s.id === id);
}

function buildSrc(screen) {
  if (!screen) return '';
  return screen.urlParam ? `${screen.src}?scenario=${screen.urlParam}` : screen.src;
}

function goToScreen(id, fromCarousel = false) {
  const screen = screenById(id);
  if (!screen) return;

  currentScreenId = id;
  label.textContent = screen.label;
  updateStatus();

  // Fade out
  overlay.classList.add('fade-in');

  setTimeout(() => {
    frame.src = buildSrc(screen);
    // Fade back in once iframe loads
    frame.onload = () => {
      overlay.classList.remove('fade-in');
      overlay.classList.add('fade-out');
      setTimeout(() => overlay.classList.remove('fade-out'), 400);
    };
  }, 350);
}

// ═══════════════════════════════════════════════════════════════
//  CAROUSEL
// ═══════════════════════════════════════════════════════════════
function startProgressBar(duration) {
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${duration}ms linear`;
      bar.style.width = '100%';
    });
  });
}

function stopProgressBar() {
  bar.style.transition = 'none';
  bar.style.width = '0%';
}

function advanceCarousel() {
  const playlist = getActivePlaylist();
  if (playlist.length === 0) return;
  carouselIndex = (carouselIndex + 1) % playlist.length;
  goToScreen(playlist[carouselIndex], true);
  startProgressBar(slideDuration);
  updateStatus();
}

function playCarousel() {
  if (carouselPlaying) return;
  carouselPlaying = true;
  // Sync index to current screen's position in the active playlist
  const playlist = getActivePlaylist();
  const pos = playlist.indexOf(currentScreenId);
  carouselIndex = pos >= 0 ? pos : 0;
  document.getElementById('play-btn').classList.add('active');
  document.getElementById('pause-btn').classList.remove('active');
  document.getElementById('st-carousel').textContent = 'playing';
  startProgressBar(slideDuration);
  carouselTimer = setInterval(advanceCarousel, slideDuration);
  updateStatus();
}

function pauseCarousel() {
  carouselPlaying = false;
  clearInterval(carouselTimer);
  carouselTimer = null;
  stopProgressBar();
  document.getElementById('play-btn').classList.remove('active');
  document.getElementById('pause-btn').classList.add('active');
  document.getElementById('st-carousel').textContent = 'paused';
  updateStatus();
}

// ═══════════════════════════════════════════════════════════════
//  STATUS BAR
// ═══════════════════════════════════════════════════════════════
function updateStatus() {
  const playlist = getActivePlaylist();
  const stage    = getActiveStage();
  document.getElementById('st-screen').textContent =
    screenById(currentScreenId)?.label ?? '—';
  document.getElementById('st-carousel').textContent =
    carouselPlaying ? 'playing' : 'paused';
  document.getElementById('st-mode').textContent =
    `${stage} · ${playlist.length} screen${playlist.length !== 1 ? 's' : ''}`;
}

// Countdown timer in status bar
setInterval(() => {
  if (!carouselPlaying || !carouselTimer) {
    document.getElementById('st-next').textContent = '—';
    return;
  }
  // Approximate — based on bar width
  const barWidth = parseFloat(bar.style.width) || 0;
  const remaining = Math.round(slideDuration * (1 - barWidth / 100) / 1000);
  document.getElementById('st-next').textContent = `${remaining}s`;
}, 500);

// ═══════════════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════════════
document.getElementById('go-btn').addEventListener('click', () => {
  pauseCarousel();
  goToScreen(document.getElementById('state-select').value);
});

document.getElementById('play-btn').addEventListener('click', playCarousel);
document.getElementById('pause-btn').addEventListener('click', pauseCarousel);

document.getElementById('speed-select').addEventListener('change', (e) => {
  slideDuration = parseInt(e.target.value);
  if (carouselPlaying) {
    pauseCarousel();
    playCarousel();
  }
});

// ═══════════════════════════════════════════════════════════════
//  GOAL OVERLAY — triggered by postMessage from match-live iframe
// ═══════════════════════════════════════════════════════════════
const goalFrame  = document.getElementById('goal-frame');

window.addEventListener('message', (e) => {
  if (e.data?.type !== 'GOAL') return;
  const scorer = e.data.scorer ?? '';
  showGoalOverlay(scorer);
});

function showGoalOverlay(scorerText) {
  // Load goal screen into the overlay iframe if not already loaded
  if (!goalFrame.src || !goalFrame.src.includes('screen-goal.html')) {
    goalFrame.src = 'screen-goal.html';
    goalFrame.onload = () => {
      goalFrame.style.display = 'block';
      goalFrame.contentWindow?.triggerGoal?.(scorerText);
    };
  } else {
    goalFrame.style.display = 'block';
    goalFrame.contentWindow?.triggerGoal?.(scorerText);
  }
  // Auto-hide after 8.5s (matches the goal animation total: 2.5s in + 5s hold + 0.8s out + 0.2s buffer)
  setTimeout(() => { goalFrame.style.display = 'none'; }, 8500);
}

// ═══════════════════════════════════════════════════════════════
//  LIVE MATCH DETECTION — poll /api/match every 60s
//  If a live match is found, inject match-live into the carousel
//  as the first screen; remove it when no longer live.
// ═══════════════════════════════════════════════════════════════
let liveMatchActive = false;

async function checkForLiveMatch() {
  try {
    const res  = await fetch('/api/match');
    const data = await res.json();
    if (!data.ok) return;

    const isLive = ['1H','2H','HT','ET','BT','P','LIVE','INT'].includes(data.statusShort);
    const hasPair = data.concurrentMatch != null; // future extension

    if (isLive && !liveMatchActive) {
      liveMatchActive = true;
      // Prepend match-live to the active playlist by temporarily overriding
      // the carousel — navigate there immediately if carousel is playing
      if (carouselPlaying) {
        pauseCarousel();
        goToScreen('match-live');
        playCarousel();
      }
    } else if (!isLive && liveMatchActive) {
      liveMatchActive = false;
    }
  } catch (e) {
    // silently ignore — network may be unavailable
  }
}

// Check for live match every 60s
setInterval(checkForLiveMatch, 60000);
checkForLiveMatch(); // immediate check on load

// ═══════════════════════════════════════════════════════════════
//  BOOT — start on coming up single, carousel paused
// ═══════════════════════════════════════════════════════════════
goToScreen('comingup-single');
updateStatus();
document.getElementById('pause-btn').classList.add('active');
</script>
</body>
</html>
